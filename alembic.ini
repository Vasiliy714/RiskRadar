# Универсальная конфигурация одной базы данных.

[alembic]
# Путь к скриптам миграций.
# Обычно задается в POSIX-формате, то есть через прямые слеши,
# относительно токена %(here)s, который указывает на расположение
# этого ini-файла.
script_location = %(here)s/alembic

# Шаблон имен файлов миграций; значение по умолчанию: %%(rev)s_%%(slug)s
# Раскомментируйте строку ниже, если хотите добавлять к файлам дату и время.
# Все доступные токены описаны здесь:
# https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# Либо раскладывайте миграции по подкаталогам с датами (нужно recursive_version_locations = true).
# file_template = %%(year)d/%%(month).2d/%%(day).2d_%%(hour).2d%%(minute).2d_%%(second).2d_%%(rev)s_%%(slug)s

# Путь sys.path, который будет добавлен в начало sys.path, если указан.
# По умолчанию используется текущая рабочая директория. Для нескольких путей
# разделитель задается параметром "path_separator" ниже.
prepend_sys_path = .

# Часовой пояс для даты внутри файла миграции и в имени файла.
# Если указан, нужна библиотека tzdata; ее можно установить,
# добавив `alembic[tz]` в зависимости pip.
# Строковое значение передается в ZoneInfo().
# Оставьте пустым, чтобы использовать локальное время.
# timezone =

# Максимальная длина поля "slug".
# truncate_slug_length = 40

# Установите 'true', чтобы запускать окружение во время команды 'revision'
# независимо от autogenerate.
# revision_environment = false

# Установите 'true', чтобы .pyc и .pyo без исходного .py-файла
# распознавались как ревизии в директории versions/.
# sourceless = false

# Расположение версий; по умолчанию это <script_location>/versions.
# При использовании нескольких директорий версий начальные ревизии
# нужно задавать через --version-path. Разделитель путей должен совпадать
# с параметром "path_separator" ниже.
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# path_separator задает символ для разделения списков путей в configparser-файлах
# вроде alembic.ini, включая version_locations и prepend_sys_path.
# В новых alembic.ini по умолчанию используется "os", то есть os.pathsep,
# чтобы разделение путей зависело от ОС.
#
# Для поддержки старых alembic.ini это значение по умолчанию НЕ применяется,
# если path_separator отсутствует в alembic.ini. Если параметр полностью
# пропущен, используется следующая резервная логика:
#
# 1. Разбор version_locations сначала использует старый ключ
#    "version_path_separator"; если его нет, используется старое поведение
#    с разделением по пробелам и/или запятым.
# 2. Разбор prepend_sys_path использует старое поведение:
#    разделение по пробелам, запятым или двоеточиям.
#
# Допустимые значения path_separator:
#
# path_separator = :
# path_separator = ;
# path_separator = space
# path_separator = newline
#
# Использовать os.pathsep. Это конфигурация по умолчанию для новых проектов.
path_separator = os


# Установите 'true', чтобы рекурсивно искать исходные файлы
# в каждой директории "version_locations".
# Добавлено в Alembic 1.10.
# recursive_version_locations = false

# Кодировка вывода при записи файлов ревизий из script.py.mako.
# output_encoding = utf-8

# URL базы данных. Используется только пользовательским скриптом env.py.
# Другие способы настройки URL базы данных можно реализовать в env.py.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks задает скрипты или Python-функции, которые запускаются
# для новых скриптов ревизий. Подробности и примеры смотрите в документации.

# Форматирование через "black": используйте runner console_scripts и entrypoint "black".
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Линтинг с автоисправлениями через "ruff": runner module и модуль "ruff".
# hooks = ruff
# ruff.type = module
# ruff.module = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Альтернатива: runner exec для запуска бинарного файла из PATH.
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Конфигурация логирования. Также используется только пользовательским env.py.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
